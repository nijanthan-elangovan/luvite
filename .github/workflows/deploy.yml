name: Build & Deploy

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.env.local \
            .next src package.json package-lock.json next.config.ts public \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/luvite/

      - name: Write env file on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            cat > /opt/luvite/.env.local << EOF
          DB_HOST=${{ secrets.DB_HOST }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_SITE_URL=https://luvite.fun
          NEXT_PUBLIC_ROOT_DOMAIN=luvite.fun
          EOF
          '

      - name: Install & Restart on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            cd /opt/luvite &&
            npm ci --production 2>&1 | tail -3 &&
            pm2 restart luvite &&
            sleep 5 &&
            curl -sf -o /dev/null http://localhost:3000 && echo "Health check: OK" || echo "Health check: FAILED"
          '
